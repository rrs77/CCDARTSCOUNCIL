kind = "web"
previewPath = "/"
title = "Creative Curriculum Designer"
version = "1.0.0"
id = "artifacts/ccd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20593

[services.development]
run = "pnpm --filter @workspace/ccd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ccd", "run", "build" ]
publicDir = "artifacts/ccd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20593"
BASE_PATH = "/"

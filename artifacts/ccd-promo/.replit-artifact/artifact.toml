kind = "video"
previewPath = "/ccd-promo/"
title = "Creative Curriculum Designer — Promo"
version = "1.0.0"
id = "artifacts/ccd-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ccd-promo/" ]
localPort = 20594

[services.development]
run = "pnpm --filter @workspace/ccd-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ccd-promo", "run", "build" ]
publicDir = "artifacts/ccd-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20594"
BASE_PATH = "/ccd-promo/"
